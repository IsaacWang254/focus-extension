<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Background - dark like space -->
  <rect width="128" height="128" rx="24" fill="#0a0a0a"/>
  
  <!-- Clock face (the "globe" being grasped) - positioned lower -->
  <circle cx="64" cy="72" r="36" fill="#ffffff" stroke="#e5e5e5" stroke-width="1.5"/>
  <circle cx="64" cy="72" r="32" fill="#f8f8f8"/>
  
  <!-- Clock marks -->
  <circle cx="64" cy="44" r="2.5" fill="#1a1a1a"/>
  <circle cx="64" cy="100" r="2.5" fill="#1a1a1a"/>
  <circle cx="36" cy="72" r="2.5" fill="#1a1a1a"/>
  <circle cx="92" cy="72" r="2.5" fill="#1a1a1a"/>
  <circle cx="83" cy="53" r="1.5" fill="#9a9a9a"/>
  <circle cx="45" cy="53" r="1.5" fill="#9a9a9a"/>
  <circle cx="83" cy="91" r="1.5" fill="#9a9a9a"/>
  <circle cx="45" cy="91" r="1.5" fill="#9a9a9a"/>
  
  <!-- Clock hands -->
  <line x1="64" y1="72" x2="64" y2="52" stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="64" y1="72" x2="82" y2="72" stroke="#E85D4C" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="64" cy="72" r="4" fill="#1a1a1a"/>
  
  <!-- Octopus body - sitting on top of the clock -->
  <ellipse cx="64" cy="32" rx="26" ry="20" fill="#E85D4C"/>
  <!-- Body highlight -->
  <ellipse cx="64" cy="28" rx="18" ry="12" fill="#F07563"/>
  
  <!-- Octopus eyes - looking menacingly forward -->
  <ellipse cx="52" cy="30" rx="8" ry="9" fill="#ffffff"/>
  <ellipse cx="76" cy="30" rx="8" ry="9" fill="#ffffff"/>
  <circle cx="54" cy="32" r="5" fill="#1a1a1a"/>
  <circle cx="78" cy="32" r="5" fill="#1a1a1a"/>
  <!-- Eye shine -->
  <circle cx="52" cy="28" r="2.5" fill="#ffffff"/>
  <circle cx="76" cy="28" r="2.5" fill="#ffffff"/>
  
  <!-- Tentacles draping down over the clock -->
  <!-- Left side tentacles -->
  <path d="M40 42 C25 55, 20 80, 16 110" stroke="#E85D4C" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M44 44 C32 60, 28 85, 26 115" stroke="#E85D4C" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M48 46 C38 65, 36 90, 38 120" stroke="#E85D4C" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M54 48 C48 68, 48 95, 52 122" stroke="#E85D4C" stroke-width="6" stroke-linecap="round" fill="none"/>
  
  <!-- Right side tentacles -->
  <path d="M88 42 C103 55, 108 80, 112 110" stroke="#E85D4C" stroke-width="9" stroke-linecap="round" fill="none"/>
  <path d="M84 44 C96 60, 100 85, 102 115" stroke="#E85D4C" stroke-width="8" stroke-linecap="round" fill="none"/>
  <path d="M80 46 C90 65, 92 90, 90 120" stroke="#E85D4C" stroke-width="7" stroke-linecap="round" fill="none"/>
  <path d="M74 48 C80 68, 80 95, 76 122" stroke="#E85D4C" stroke-width="6" stroke-linecap="round" fill="none"/>
  
  <!-- Tentacle suckers -->
  <circle cx="20" cy="90" r="2.5" fill="#F07563"/>
  <circle cx="24" cy="100" r="2" fill="#F07563"/>
  <circle cx="108" cy="90" r="2.5" fill="#F07563"/>
  <circle cx="104" cy="100" r="2" fill="#F07563"/>
  <circle cx="30" cy="95" r="2" fill="#F07563"/>
  <circle cx="98" cy="95" r="2" fill="#F07563"/>
</svg>
