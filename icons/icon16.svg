<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Background -->
  <rect width="16" height="16" rx="3" fill="#0a0a0a"/>
  
  <!-- Clock face - positioned lower -->
  <circle cx="8" cy="10" r="5" fill="#ffffff"/>
  <circle cx="8" cy="10" r="4" fill="#f8f8f8"/>
  
  <!-- Clock hands -->
  <line x1="8" y1="10" x2="8" y2="7" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round"/>
  <line x1="8" y1="10" x2="11" y2="10" stroke="#E85D4C" stroke-width="0.75" stroke-linecap="round"/>
  <circle cx="8" cy="10" r="0.75" fill="#1a1a1a"/>
  
  <!-- Octopus body - sitting on top -->
  <ellipse cx="8" cy="4" rx="4" ry="3" fill="#E85D4C"/>
  
  <!-- Eyes -->
  <circle cx="6.5" cy="3.5" r="1.2" fill="#ffffff"/>
  <circle cx="9.5" cy="3.5" r="1.2" fill="#ffffff"/>
  <circle cx="6.7" cy="3.7" r="0.6" fill="#1a1a1a"/>
  <circle cx="9.7" cy="3.7" r="0.6" fill="#1a1a1a"/>
  
  <!-- Tentacles draping down -->
  <path d="M5 6 C2 9, 1 12, 0 16" stroke="#E85D4C" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M6 6.5 C4.5 10, 4 13, 4 16" stroke="#E85D4C" stroke-width="1.2" stroke-linecap="round" fill="none"/>
  <path d="M11 6 C14 9, 15 12, 16 16" stroke="#E85D4C" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M10 6.5 C11.5 10, 12 13, 12 16" stroke="#E85D4C" stroke-width="1.2" stroke-linecap="round" fill="none"/>
</svg>
