<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for gradients -->
  <defs>
    <linearGradient id="octopusGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:1" /> <!-- Purple -->
      <stop offset="100%" style="stop-color:#3498db;stop-opacity:1" /> <!-- Blue -->
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="1" dy="2" stdDeviation="1" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Octopus Head (Back layer - Behind Clock) -->
  <!-- Making it rounder and wider -->
  <path d="M 24 55 C 24 10, 104 10, 104 55 C 104 80, 24 80, 24 55" fill="url(#octopusGrad)" />

  <!-- Tentacles (Back layer) -->
  <!-- Upper Left Back -->
  <path d="M 35 60 C 10 60, 5 90, 15 110" stroke="url(#octopusGrad)" stroke-width="9" fill="none" stroke-linecap="round" />
  <!-- Upper Right Back -->
  <path d="M 93 60 C 118 60, 123 90, 113 110" stroke="url(#octopusGrad)" stroke-width="9" fill="none" stroke-linecap="round" />

  <!-- Clock Face (Main body) -->
  <circle cx="64" cy="80" r="28" fill="#ecf0f1" stroke="#2c3e50" stroke-width="4" filter="url(#shadow)" />
  
  <!-- Clock Ticks -->
  <path d="M 64 56 L 64 60" stroke="#bdc3c7" stroke-width="2" />
  <path d="M 64 100 L 64 104" stroke="#bdc3c7" stroke-width="2" />
  <path d="M 88 80 L 84 80" stroke="#bdc3c7" stroke-width="2" />
  <path d="M 40 80 L 44 80" stroke="#bdc3c7" stroke-width="2" />

  <!-- Clock Hands -->
  <line x1="64" y1="80" x2="64" y2="65" stroke="#e74c3c" stroke-width="3" stroke-linecap="round" />
  <line x1="64" y1="80" x2="76" y2="80" stroke="#e74c3c" stroke-width="3" stroke-linecap="round" />
  <circle cx="64" cy="80" r="3" fill="#c0392b" />

  <!-- Tentacles (Front layer - Wrapping over) -->
  <!-- Lower Left Front - curling onto the clock -->
  <path d="M 40 65 Q 25 90 45 105" stroke="url(#octopusGrad)" stroke-width="9" fill="none" stroke-linecap="round" />
  <!-- Lower Right Front - curling onto the clock -->
  <path d="M 88 65 Q 103 90 83 105" stroke="url(#octopusGrad)" stroke-width="9" fill="none" stroke-linecap="round" />

  <!-- Octopus Face Area (Front) -->
  <!-- Connecting body to head smoothly -->
  <path d="M 30 55 C 30 35, 98 35, 98 55 L 93 65 L 35 65 Z" fill="url(#octopusGrad)" />

  <!-- Eyes -->
  <g transform="translate(0, 5)"> <!-- Shift eyes down slightly -->
    <circle cx="48" cy="45" r="7" fill="white" />
    <circle cx="80" cy="45" r="7" fill="white" />
    <circle cx="48" cy="45" r="3" fill="#2c3e50" />
    <circle cx="80" cy="45" r="3" fill="#2c3e50" />
    
    <!-- Highlights -->
    <circle cx="50" cy="43" r="1.5" fill="white" fill-opacity="0.9" />
    <circle cx="82" cy="43" r="1.5" fill="white" fill-opacity="0.9" />
  </g>

</svg>