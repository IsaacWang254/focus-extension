<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16">
  <!-- Background -->
  <rect width="16" height="16" rx="3" fill="#0a0a0a"/>
  <!-- Sun/horizon - represents a new day -->
  <circle cx="8" cy="11" r="4.5" fill="#F59E0B"/>
  <!-- Horizon line -->
  <rect x="1.5" y="11" width="13" height="5" rx="1" fill="#0a0a0a"/>
  <!-- Sun rays -->
  <line x1="8" y1="2" x2="8" y2="4" stroke="#F59E0B" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="3.5" y1="5.5" x2="4.9" y2="6.9" stroke="#F59E0B" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="12.5" y1="5.5" x2="11.1" y2="6.9" stroke="#F59E0B" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="1.5" y1="9.5" x2="3.2" y2="9.5" stroke="#F59E0B" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="14.5" y1="9.5" x2="12.8" y2="9.5" stroke="#F59E0B" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Horizon accent line -->
  <line x1="2.5" y1="11" x2="13.5" y2="11" stroke="#FBBF24" stroke-width="0.75" stroke-linecap="round"/>
</svg>
