<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <!-- Background -->
  <rect width="48" height="48" rx="10" fill="#0a0a0a"/>
  
  <!-- Clock face - positioned lower -->
  <circle cx="24" cy="28" r="14" fill="#ffffff" stroke="#e5e5e5" stroke-width="1"/>
  <circle cx="24" cy="28" r="12" fill="#f8f8f8"/>
  
  <!-- Clock marks -->
  <circle cx="24" cy="18" r="1" fill="#1a1a1a"/>
  <circle cx="24" cy="38" r="1" fill="#1a1a1a"/>
  <circle cx="14" cy="28" r="1" fill="#1a1a1a"/>
  <circle cx="34" cy="28" r="1" fill="#1a1a1a"/>
  
  <!-- Clock hands -->
  <line x1="24" y1="28" x2="24" y2="20" stroke="#1a1a1a" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="28" x2="31" y2="28" stroke="#E85D4C" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="24" cy="28" r="1.5" fill="#1a1a1a"/>
  
  <!-- Octopus body - sitting on top -->
  <ellipse cx="24" cy="12" rx="10" ry="8" fill="#E85D4C"/>
  <ellipse cx="24" cy="10" rx="7" ry="5" fill="#F07563"/>
  
  <!-- Eyes -->
  <ellipse cx="20" cy="11" rx="3" ry="3.5" fill="#ffffff"/>
  <ellipse cx="28" cy="11" rx="3" ry="3.5" fill="#ffffff"/>
  <circle cx="21" cy="12" r="2" fill="#1a1a1a"/>
  <circle cx="29" cy="12" r="2" fill="#1a1a1a"/>
  
  <!-- Tentacles draping down -->
  <path d="M15 17 C8 25, 6 35, 4 46" stroke="#E85D4C" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M17 18 C12 28, 10 38, 9 47" stroke="#E85D4C" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M20 19 C17 30, 17 40, 18 48" stroke="#E85D4C" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  
  <path d="M33 17 C40 25, 42 35, 44 46" stroke="#E85D4C" stroke-width="3.5" stroke-linecap="round" fill="none"/>
  <path d="M31 18 C36 28, 38 38, 39 47" stroke="#E85D4C" stroke-width="3" stroke-linecap="round" fill="none"/>
  <path d="M28 19 C31 30, 31 40, 30 48" stroke="#E85D4C" stroke-width="2.5" stroke-linecap="round" fill="none"/>
</svg>
