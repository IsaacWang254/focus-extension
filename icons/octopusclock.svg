<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Octopus body (round head) -->
  <circle cx="64" cy="48" r="36" fill="#7C3AED"/>
  
  <!-- Clock face on octopus head -->
  <circle cx="64" cy="48" r="24" fill="#FFFFFF"/>
  <circle cx="64" cy="48" r="22" fill="#F3F4F6" stroke="#374151" stroke-width="2"/>
  
  <!-- Clock hour marks -->
  <circle cx="64" cy="30" r="2" fill="#374151"/>
  <circle cx="64" cy="66" r="2" fill="#374151"/>
  <circle cx="46" cy="48" r="2" fill="#374151"/>
  <circle cx="82" cy="48" r="2" fill="#374151"/>
  
  <!-- Clock hands -->
  <line x1="64" y1="48" x2="64" y2="36" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <line x1="64" y1="48" x2="74" y2="48" stroke="#7C3AED" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Clock center dot -->
  <circle cx="64" cy="48" r="3" fill="#7C3AED"/>
  
  <!-- Octopus eyes (on sides of clock) -->
  <circle cx="38" cy="38" r="6" fill="#FFFFFF"/>
  <circle cx="90" cy="38" r="6" fill="#FFFFFF"/>
  <circle cx="39" cy="37" r="3" fill="#1F2937"/>
  <circle cx="91" cy="37" r="3" fill="#1F2937"/>
  
  <!-- Tentacles -->
  <path d="M32 80 Q28 95 20 105 Q18 110 22 108 Q32 100 38 85" fill="#7C3AED"/>
  <path d="M44 82 Q42 100 38 115 Q36 120 42 117 Q50 105 52 88" fill="#7C3AED"/>
  <path d="M58 84 Q56 105 54 120 Q53 125 60 122 Q64 108 64 90" fill="#7C3AED"/>
  <path d="M70 84 Q72 105 74 120 Q75 125 68 122 Q64 108 64 90" fill="#7C3AED"/>
  <path d="M84 82 Q86 100 90 115 Q92 120 86 117 Q78 105 76 88" fill="#7C3AED"/>
  <path d="M96 80 Q100 95 108 105 Q110 110 106 108 Q96 100 90 85" fill="#7C3AED"/>
</svg>
